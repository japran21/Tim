<!DOCTYPE html>
<html>
<head>
    <title>Test AJAX</title>
</head>
<body>
    <h2>Test AJAX get_produk.php</h2>
    
    <button onclick="testRasa('Pedas')">Test Rasa Pedas</button>
    <button onclick="testRasa('Manis')">Test Rasa Manis</button>
    <button onclick="testSearch('ayam')">Search 'ayam'</button>
    
    <pre id="result"></pre>
    
    <script>
    function testRasa(rasa) {
        fetch('get_produk.php?rasa=' + encodeURIComponent(rasa))
            .then(r => r.json())
            .then(data => {
                document.getElementById('result').innerHTML = JSON.stringify(data, null, 2);
                console.log(data);
            })
            .catch(err => {
                document.getElementById('result').innerHTML = 'Error: ' + err;
            });
    }
    
    function testSearch(keyword) {
        fetch('get_produk.php?keyword=' + encodeURIComponent(keyword))
            .then(r => r.json())
            .then(data => {
                document.getElementById('result').innerHTML = JSON.stringify(data, null, 2);
            })
            .catch(err => {
                document.getElementById('result').innerHTML = 'Error: ' + err;
            });
    }
    </script>
</body>
</html>
